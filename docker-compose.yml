services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nutrimatic
      POSTGRES_PASSWORD: nutrimatic
      POSTGRES_DB: nutrimatic
    ports:
      # host port 5433, not 5432 — avoids clashing with a locally-installed Postgres.
      # Only matters for host-side tools (e.g. ingest_fdc.py); the backend container
      # talks to this over the docker network on the default 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrimatic"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://nutrimatic:nutrimatic@postgres:5432/nutrimatic
      # Dev-only value so `docker compose up` doesn't silently fall back to
      # app/auth.py's hardcoded "dev-secret-change-me" default (anyone who's
      # read the source — i.e. everyone, it's public — could otherwise forge
      # auth tokens for any user id). A real deployment MUST override this
      # with its own secret (e.g. via an untracked .env file / host secret
      # manager), never reuse the value below outside local development.
      JWT_SECRET: "1596dfe31d13c3682f357d84658459591506c44c91bb23eb8e063d12087e4799"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
