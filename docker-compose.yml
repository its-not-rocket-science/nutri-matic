services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nutrimatic
      POSTGRES_PASSWORD: nutrimatic
      POSTGRES_DB: nutrimatic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrimatic"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://nutrimatic:nutrimatic@postgres:5432/nutrimatic
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
